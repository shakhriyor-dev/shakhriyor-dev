name: Generate Hacker Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: shakhriyor-dev
          outputs: dist/github-contribution-grid-snake.svg
          theme: dark  # Dark theme hacker style

      - name: Ensure dist folder exists
        run: mkdir -p dist

      - name: Commit and push snake
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add dist/github-contribution-grid-snake.svg
          git commit -m "Update hacker snake" || echo "No changes to commit"
          git push
